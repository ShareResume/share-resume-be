version: '3.8'

services:

  app:
    container_name: share-resume-be
    build:
      dockerfile: Dockerfile
    ports:
      - "${DOCKER_BE_APP_EXPOSE_PORT}:8080"
    environment:
      - "DB_USER=${DB_USER}"
      - "DB_PASSWORD=${DB_PASSWORD}"
      - "DB=${DB}"
      - "DB_HOST=${DB_HOST}"
      - "DB_PORT=${DB_PORT}"
      - "JWT_PRIVATE_KEY=${JWT_PRIVATE_KEY}"
      - "JWT_PUBLIC_KEY=${JWT_PUBLIC_KEY}"
      - "JWT_EXPIRATION_MINUTES=${JWT_EXPIRATION_MINUTES}"
      - "JWT_REFRESH_TOKEN_EXPIRATION_DAYS=${JWT_REFRESH_TOKEN_EXPIRATION_DAYS}"
    depends_on:
      - db
  db:
    container_name: share-resume-db
    image: postgres:13.4
    ports:
      - "${DOCKER_EXPOSE_DB_PORT}:5432"
    environment:
      - "POSTGRES_USER=${DB_USER}"
      - "POSTGRES_PASSWORD=${DB_PASSWORD}"
      - "POSTGRES_DB=${DB}"
    volumes:
      - database_data:/var/lib/postgresql/data/
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB}" ]
      interval: 1s
      timeout: 10s
      retries: 15

volumes:
  database_data: